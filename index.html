<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Calculator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0c0e1a 0%, #1a1c2e 50%, #0c0e1a 100%);
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: #fff;
            font-size: 28px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 8px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .input-group label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            font-weight: 500;
            width: 100%;
            margin-bottom: -4px;
        }

        .input-group input[type="datetime-local"] {
            flex: 1;
            padding: 14px 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
            min-width: 200px;
        }

        .input-group input[type="datetime-local"]:focus {
            border-color: #6c63ff;
        }

        .input-group input[type="datetime-local"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        .set-btn {
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #6c63ff, #e040fb);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            white-space: nowrap;
        }

        .set-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(108, 99, 255, 0.4);
        }

        .set-btn:active {
            transform: translateY(0);
        }

        .display-area {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 32px 20px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .countdown-number {
            font-size: 72px;
            font-weight: 700;
            background: linear-gradient(135deg, #6c63ff, #e040fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            text-align: center;
            letter-spacing: 2px;
        }

        .countdown-unit {
            font-size: 24px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.6);
            margin-left: 12px;
            text-transform: lowercase;
        }

        .countdown-label {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.4);
            text-align: center;
        }

        .unit-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .unit-btn {
            padding: 10px 18px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: lowercase;
        }

        .unit-btn:hover {
            border-color: rgba(108, 99, 255, 0.4);
            color: #fff;
            background: rgba(108, 99, 255, 0.1);
        }

        .unit-btn.active {
            border-color: #6c63ff;
            background: rgba(108, 99, 255, 0.2);
            color: #fff;
            box-shadow: 0 0 20px rgba(108, 99, 255, 0.15);
        }

        .presets {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 28px;
            justify-content: center;
        }

        .preset-btn {
            padding: 8px 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            background: transparent;
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .preset-btn:hover {
            border-color: rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.05);
        }

        .status {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.35);
        }

        .status .target-time {
            color: rgba(255, 255, 255, 0.6);
        }

        .expired {
            color: #ff6b6b !important;
            -webkit-text-fill-color: #ff6b6b !important;
        }

        @media (max-width: 500px) {
            .container {
                padding: 24px 16px;
            }
            .countdown-number {
                font-size: 48px;
            }
            .countdown-unit {
                font-size: 18px;
            }
            .unit-btn {
                padding: 8px 12px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>⏱ Countdown Calculator</h1>
    <p class="subtitle">Set a target time and display the remaining time in your chosen unit</p>

    <div class="input-group">
        <label for="targetDatetime">Target Date &amp; Time</label>
        <input type="datetime-local" id="targetDatetime">
        <button class="set-btn" id="setButton">Set Target</button>
    </div>

    <div class="presets">
        <button class="preset-btn" data-offset="60">+1 minute</button>
        <button class="preset-btn" data-offset="3600">+1 hour</button>
        <button class="preset-btn" data-offset="86400">+1 day</button>
        <button class="preset-btn" data-offset="604800">+1 week</button>
        <button class="preset-btn" data-offset="2592000">+1 month (30d)</button>
        <button class="preset-btn" data-offset="31536000">+1 year (365d)</button>
    </div>

    <div class="display-area">
        <div id="displayContent">
            <span class="countdown-label">Set a target time to begin</span>
        </div>
    </div>

    <div class="unit-buttons" id="unitButtons">
        <button class="unit-btn" data-unit="years">years</button>
        <button class="unit-btn active" data-unit="days">days</button>
        <button class="unit-btn" data-unit="hours">hours</button>
        <button class="unit-btn" data-unit="minutes">minutes</button>
        <button class="unit-btn" data-unit="seconds">seconds</button>
        <button class="unit-btn" data-unit="weeks">weeks</button>
        <button class="unit-btn" data-unit="months">months</button>
    </div>

    <div class="status" id="status">Waiting for target…</div>
</div>

<script>
    (function() {
        // ----- state -----
        let targetTime = null;          // Date object
        let activeUnit = 'days';
        let timerId = null;

        const displayEl = document.getElementById('displayContent');
        const statusEl = document.getElementById('status');
        const inputEl = document.getElementById('targetDatetime');
        const setBtn = document.getElementById('setButton');
        const unitBtns = document.querySelectorAll('.unit-btn');
        const presetBtns = document.querySelectorAll('.preset-btn');

        // set default value to 24 hours from now
        function setDefaultInput() {
            const d = new Date(Date.now() + 86400000);
            const iso = d.toISOString().slice(0, 16);
            inputEl.value = iso;
        }
        setDefaultInput();

        // ----- helpers -----
        function getDiffSeconds() {
            if (!targetTime) return 0;
            return (targetTime.getTime() - Date.now()) / 1000;
        }

        function formatNumber(num) {
            return num.toLocaleString(undefined, { maximumFractionDigits: 2, minimumFractionDigits: 0 });
        }

        function computeUnit(seconds, unit) {
            if (seconds <= 0) return 0;
            switch (unit) {
                case 'years':   return seconds / 31536000;
                case 'months':  return seconds / 2592000;   // 30 days
                case 'weeks':   return seconds / 604800;
                case 'days':    return seconds / 86400;
                case 'hours':   return seconds / 3600;
                case 'minutes': return seconds / 60;
                case 'seconds': return seconds;
                default:        return seconds;
            }
        }

        function updateDisplay() {
            if (!targetTime) {
                displayEl.innerHTML = `<span class="countdown-label">Set a target time to begin</span>`;
                statusEl.textContent = 'No target set.';
                return;
            }

            const diffSec = getDiffSeconds();

            if (diffSec <= 0) {
                displayEl.innerHTML = `
                    <span class="countdown-number expired">00.00</span>
                    <span class="countdown-unit">—</span>
                `;
                statusEl.innerHTML = `⏰ Target reached: <span class="target-time">${targetTime.toLocaleString()}</span>`;
                return;
            }

            const value = computeUnit(diffSec, activeUnit);
            const displayValue = value < 10 ? value.toFixed(4) : value < 100 ? value.toFixed(2) : formatNumber(Math.floor(value));

            const unitLabel = value === 1 ? activeUnit.replace(/s$/, '') : activeUnit;

            displayEl.innerHTML = `
                <span class="countdown-number">${displayValue}</span>
                <span class="countdown-unit">${unitLabel}</span>
            `;

            const remaining = targetTime.toLocaleString();
            statusEl.innerHTML = `⏳ Until <span class="target-time">${remaining}</span>`;
        }

        function refresh() {
            updateDisplay();
        }

        function startTimer() {
            if (timerId) clearInterval(timerId);
            timerId = setInterval(refresh, 100);
            refresh();
        }

        // ----- setting target -----
        function setTarget(dateStr) {
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) {
                alert('Please enter a valid date and time.');
                return false;
            }
            targetTime = d;
            startTimer();
            return true;
        }

        setBtn.addEventListener('click', function() {
            setTarget(inputEl.value);
        });

        inputEl.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                setTarget(inputEl.value);
            }
        });

        // ----- preset buttons -----
        presetBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                const offsetSec = parseInt(this.dataset.offset, 10);
                const d = new Date(Date.now() + offsetSec * 1000);
                const iso = d.toISOString().slice(0, 16);
                inputEl.value = iso;
                setTarget(iso);
            });
        });

        // ----- unit buttons -----
        unitBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                unitBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                activeUnit = this.dataset.unit;
                if (targetTime) refresh();
            });
        });

        // ----- init with default -----
        // set target to default (24h from now)
        setTarget(inputEl.value);
    })();
</script>

</body>
</html>
